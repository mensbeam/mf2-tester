<script>
async function getMeta() {
  // import the base data with URLs and versions
  var meta = JSON.parse(document.getElementById("library_data").textContent);
  // hash the successful outputs and indicate failure
  var promises = {};
  var enc = new TextEncoder();
  for (let lib in meta) {
    let output = document.querySelector("#library_outputs>pre#lib_"+lib);
    if (output.classList.contains("output")) {
      meta[lib].success = true;
      promises[lib] = window.crypto.subtle.digest("SHA-1", enc.encode(output.textContent));
    } else {
      meta[lib].success = false;
    }
  }
  for (let lib in promises) {
    meta[lib].hash = new Uint8Array(await promises[lib]).toHex();
  }
  return meta;
}

function makeDetail(id, summary, lang) {
  var d = document.createElement("details");
  var s = document.createElement("summary");
  var c = document.createElement("pre").appendChild(document.createElement("code"));
  s.innerHTML = summary;
  c.textContent = document.getElementById(id).textContent;
  if (lang && window.hljs) {
    c.setAttribute("class", "language-"+lang);
    hljs.highlightElement(c);
  }
  d.appendChild(s);
  d.appendChild(c.parentNode);
  return d;
}

function formatDiff(el) {
  var form = document.getElementsByTagName("form")[0];
  var subject = form.diff_what.value;
  var mode = form.diff_how.value;
  var lib = hashes[el.closest("details").getAttribute("data-hash")][0];
  var source = document.getElementById("lib_"+hashes[subject][0]).textContent;
  let comp = document.getElementById("lib_"+lib).textContent;
  let diff = null;
  if (mode == "word") {
    diff = Diff.diffWords(source, comp);
  } else if (mode == "line") {
    diff = Diff.diffLines(source, comp);
  } else {
    let headerSeen = false;
    diff = Diff.createTwoFilesPatch(hashes[subject][0], lib, source, comp).split('\n').map(line => {
      var out = {
        value: line + "\n",
        added: headerSeen && line.startsWith("+"),
        removed: headerSeen && line.startsWith("-"),
      };
      if (line.startsWith("@@")) {
        headerSeen = true;
      }
      return out;
    });
  }
  el.innerHTML = "";
  diff.forEach(p => {
    if (p.added) {
      var pp = document.createElement("ins");
      pp.textContent = p.value;
    } else if (p.removed) {
      var pp = document.createElement("del");
      pp.textContent = p.value;
    } else {
      var pp = document.createTextNode(p.value);
    }
    el.appendChild(pp);
  });
}

function makeDiffs() {
  var form = document.getElementsByTagName("form")[0];
  var subject = form.diff_what.value;
  if (subject == "") {
    // TODO: Implement custom diffing
    return;
  }
  // compute the requested differences
  var mode = form.diff_how.value;
  var f = document.createDocumentFragment();
  for (let h in hashes) {
    if (h == subject) {
      // don't diff the subject
      continue;
    }
    let comp = document.getElementById("lib_"+hashes[h][0]).textContent;
    let pre = document.createElement("pre");
    let d = document.createElement("details");
    let s = document.createElement("summary");
    s.textContent = hashes[h].join(" ");
    d.setAttribute("data-hash", h);
    d.appendChild(s);
    d.appendChild(pre);
    f.appendChild(d);
    formatDiff(pre);
  }
  // clear the existing differences and insert the new elements
  var p = document.getElementById("diffs");
  p.innerHTML = "";
  p.appendChild(f);
}

function remakeDiffs() {
  // unlike its sibling this function retails the outer <detail> elements, so they will stay expanded when a diff is recalculated
  for (el of document.querySelectorAll("#diffs pre")) {
    formatDiff(el);
  }
}

async function start() {
  // compute the required metadata
  meta = await getMeta();
  hashes = {};
  for (let lib in window.meta) {
    if (!meta[lib].success) {
      continue;
    }
    let h = meta[lib].hash;
    if (!(h in hashes)) {
      hashes[h] = [];
    }
    hashes[h].push(lib);
  }
  // display the input document
  document.getElementById("input").appendChild(makeDetail("library_input", "HTML", "html"));
  // display the successful outputs, with equivalent results grouped together
  var p = document.getElementById("outputs");
  for (let h in hashes) {
    p.appendChild(makeDetail("lib_"+hashes[h][0], hashes[h].join(" "), "json"));
  }
  // display the error outputs, each separately
  var p = document.getElementById("errors");
  for (let lib in meta) {
    if (meta[lib].success) {
      continue;
    }
    p.appendChild(makeDetail("lib_"+lib, lib));
  }
  // fill in the difference options
  var p = document.getElementsByName("diff_what")[0];
  for (let h in hashes) {
    let o = document.createElement("option");
    o.setAttribute("value", h);
    o.textContent = hashes[h].join(" ");
    p.appendChild(o);
  }
  // define events for the form elements
  for (let e of document.querySelectorAll('*[name="diff_what"]')) {
    e.addEventListener("change", makeDiffs);
  }
  for (let e of document.querySelectorAll('*[name="diff_how"]')) {
    e.addEventListener("change", remakeDiffs);
  }
}
</script>
<body onload="start();">
<h2>Input document</h2>
<div id="input"></div>
<h2>Successful results</h2>
<div id="outputs"></div>
<h2>Error results</h2>
<div id="errors"></div>
<h2>View differences</h2>
<form>
  <div>Difference from: <select name="diff_what" onchange="makeDiff();"><option value="">Custom...</option></select></div>
  <div>Mode: <label><input type="radio" name="diff_how" value="word" checked>Word</label> <label><input type="radio" name="diff_how" value="line">Line</label> <label><input type="radio" name="diff_how" value="patch">Patch</label></div>
</form>
<div id="diffs"></div>
